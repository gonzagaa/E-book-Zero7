  <script>
  // gera e guarda o eventID ANTES para casar Pixel + API
  window.__eventID = '_' + Math.random().toString(36).slice(2, 11);

  function pixelReady() {
    return typeof window.fbq === 'function' && window.fbq.loaded;
  }

  function safeTrackPageView() {
    if (!pixelReady()) return false;
    fbq('track', 'PageView', {}, { eventID: window.__eventID });
    console.log('📤 Pixel PageView enviado com eventID:', window.__eventID);
    return true;
  }

  window.addEventListener('DOMContentLoaded', function () {
    // tenta por até ~3s (20 tentativas × 150ms)
    let tries = 0;
    const iv = setInterval(function () {
      tries++;
      if (safeTrackPageView() || tries > 20) clearInterval(iv);
    }, 150);
  });
  </script>

  <script>
  function getFbp() {
    const existing = localStorage.getItem('_fbp');
    if (existing) return existing;
    const fbp = 'fb.1.' + Date.now() + '.' + Math.floor(Math.random() * 1e10);
    localStorage.setItem('_fbp', fbp);
    return fbp;
  }

  function getFbc() {
    const fbclid = new URLSearchParams(window.location.search).get('fbclid');
    if (!fbclid) return '';
    return 'fb.1.' + Date.now() + '.' + fbclid;
  }

  function sendCapiPageView() {
    const fbp = getFbp();
    const fbc = getFbc();

    fetch('https://backend-api-zero7.vercel.app/api/send-event', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        event_name: 'PageView',
        event_id: window.__eventID,           // <<< MESMO ID do Pixel
        fbp,
        fbc,
        email: 'anonimo@teste.com'
      })
    })
    .then(r => r.json())
    .then(d => console.log('📥 Resposta API Facebook:', d))
    .catch(e => console.error('❌ Erro na chamada da API:', e));
  }

  // mantenha o envio da API no DOMContentLoaded
  window.addEventListener('DOMContentLoaded', sendCapiPageView);
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/countup.js/1.9.3/countUp.min.js"></script>

  <script>
(() => {
  // Lista de prazos (fuso de Brasília -03:00)
  const prazosPromo = [
    new Date("2026-02-08T23:59:59-03:00"),
  ];

  const root = document.getElementById("countdownPromo");
  if (!root) return;

  const diasEl = document.getElementById("diasPromo");
  const horasEl = document.getElementById("horasPromo");
  const minutosEl = document.getElementById("minutosPromo");
  const segundosEl = document.getElementById("segundosPromo");

  const pad2 = (n) => String(n).padStart(2, "0");

  function getPrazoAtual(agora) {
    // pega o primeiro prazo que ainda não passou
    return prazosPromo.find((prazo) => prazo.getTime() > agora.getTime()) || null;
  }

  function tickPromo() {
    const agora = new Date();
    const fimPromo = getPrazoAtual(agora);

    // Se não tiver mais nenhum prazo futuro, some com o timer
    if (!fimPromo) {
      clearInterval(intervaloPromo);
      root.style.display = "none";
      return;
    }

    const diff = fimPromo - agora;

    const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutos = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const segundos = Math.floor((diff % (1000 * 60)) / 1000);

    diasEl.textContent = pad2(dias);
    horasEl.textContent = pad2(horas);
    minutosEl.textContent = pad2(minutos);
    segundosEl.textContent = pad2(segundos);
  }

  const intervaloPromo = setInterval(tickPromo, 1000);
  tickPromo(); // inicializa
})();
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const optionsBase = {
        useEasing: true,
        separator: '.',
        decimal: ',',
      };

      const optionsAno = {
        ...optionsBase,
        useGrouping: false // sem ponto em 2023
      };

      const optionsTraders = {
        ...optionsBase,
        prefix: "+",
        useGrouping: true
      };

      const optionsPagamentos = {
        ...optionsBase,
        prefix: "+",
        useGrouping: true
      };

      const createAnimations = () => {
        const ano = new CountUp("ano", 0, 2023, 0, 3, optionsAno);
        const traders = new CountUp("traders", 0, 20, 0, 3, optionsTraders);
        const pagamentos = new CountUp("pagamentos", 0, 12, 0, 3, optionsPagamentos);

        if (!ano.error) ano.start();
        if (!traders.error) traders.start();
        if (!pagamentos.error) pagamentos.start();
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            createAnimations(); // annnimma novamente sempre que a seção voltar à viewport
          }
        });
      });

      observer.observe(document.querySelector('#ano'));
    });
  </script>
